<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
	<link rel="stylesheet" type="text/css" href="assets/css/reset.css">
	<link rel="stylesheet" type="text/css" href="assets/css/mainstyle.css">
	<link rel="stylesheet" type="text/css" href="assets/css/media-queries.css">
	<script src="assets/js/index.js" type="module"></script>
	<link rel="shortcut icon" href="assets/media/favicon-filled.webp" type="image/x-icon">
	<title>Web Components Navigator</title>
</head>

<body>
	<header id="page-header">
		<h1><span class="favicon"></span>Web Components Navigator</h1>
		<button id="theme-toggle" aria-label="Toggle light/dark mode">
			<img id="theme-icon" src="assets/media/sun-moon.svg" alt="">
		</button>
	</header>
	<aside id="page-sidebar">
		<div class="filters-sidebar container">
			<section class="filter-section hidden">
				<h2>Owners</h2>
				<ul id="filter-list-owner">
				</ul>
			</section>
			<section class="filter-section">
				<h2>Categories</h2>
				<ul id="filter-list-category">
				</ul>
			</section>
		</div>
	</aside>
	<main>
		<div id="repos"></div>
	</main>
	<template id="template--repo">
		<div class="container repo-container">
			<header class="repo-header">
				<a href="#" class="repo-link" target="_blank"></a>
				<h2 class="repo-title">
					<span class="repo-name">-</span>
					<i>by</i>
					<span class="repo-owner">-</span>
				</h2>
			</header>
			<div class="repo-categories">Loading...</div>
		</div>
	</template>
	<template id="template--category">
		<section class="category-container">
			<h3 class="category-name">-</h3>
			<div class="components"></div>
		</section>
	</template>
	<template id="template--component">
		<div class="button component-button">
			<a href="#" class="btn btn-source-code" target="_blank">&lt;/&gt;</a>
			<a href="#" class="btn btn-preview" target="_blank">-</a>
		</div>
	</template>
</body>

</html>
